<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dash Board</title>
    <link rel="stylesheet" href="apex.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div id="grid-container">
      <div class="box box-1" style="grid-area: box-1">
        <div id="side-bar">
            <div id="square"></div>
            <i class="fa-solid fa-house"></i>
            <i class="fa-solid fa-chart-bar"></i>
            <i class="fa-solid fa-gear"></i>
        </div>
        </div>
      <div class="box box-2" style="grid-area: box-2">
        <h1>Dash Board</h1>
        <div id="circle"></div>
      </div>
      <div class="box box-3" style="grid-area: box-3">
        <p>Total Users</p>
        <strong>1,204</strong>
      </div>
      <div class="box box-4" style="grid-area: box-4">
        <p>Revenue</p>
        <strong>$8,430</strong>
      </div>
      <div class="box box-5" style="grid-area: box-5">
        <p>ActiveTasks</p>
        <strong>37</strong>
      </div>
      <div class="box box-6" style="grid-area: box-6">
        <p>Activity Overview</p>
        <div id="bar-container">
          <div class="bar bar-1"></div>
          <div class="bar bar-2"></div>
          <div class="bar bar-3"></div>
          <div class="bar bar-4"></div>
          <div class="bar bar-5"></div>
        </div>
      </div>
    </div>
  </body>
</html>
