<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Card</title>
    <link rel="stylesheet" href="apex.css">
</head>
<body>
    <div id="recipecard">
        <div id="top">
            <figure>
                <img src="https://placehold.co/280x140" alt="Recipe Image">
            </figure>
        </div>
        <div id="recipe-content">
            <h2>Lemon garlic pasta</h2>
            <p>20 mins  2 Servings</p>
            <p>Ingredients</p>
            <ul>
                <li>200g spaghetti</li>
                <li>3 garlic cloves</li>
                <li>1 lemon,zested</li>
                <li>Olive oil,salt,pepper</li>
            </ul>
            <button>
                View recipe
            </button>
        </div>
    </div>
</body>
</html>
